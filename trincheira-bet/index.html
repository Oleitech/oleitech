<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trincheira Bet — Análise de Apostas</title>
  <meta name="description" content="Análise estatística de jogos de futebol. Identifica padrões de apostas: Ambas Marcam, Over 2.5, Handicap, Vitória 1ª Parte.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9917;</text></svg>">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Login Screen -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <div class="login-card__logo">&#9917; Trincheira <span>Bet</span></div>
      <div class="login-card__subtitle">Acesso Restrito</div>
      <form class="login-card__form" id="login-form">
        <div class="login-card__field">
          <label for="login-user">Utilizador</label>
          <input type="text" id="login-user" autocomplete="username" placeholder="Username" required>
        </div>
        <div class="login-card__field">
          <label for="login-pass">Password</label>
          <input type="password" id="login-pass" autocomplete="current-password" placeholder="Password" required>
        </div>
        <div class="login-card__error" id="login-error"></div>
        <button type="submit" class="login-card__btn">Entrar</button>
      </form>
    </div>
  </div>

  <div class="app" id="app-main" style="display:none">
    <!-- Header -->
    <header class="header">
      <div class="header__inner">
        <div class="header__brand">
          <div>
            <div class="header__logo">&#9917; Trincheira <span>Bet</span></div>
            <div class="header__subtitle">Especialista BTTS</div>
          </div>
        </div>

        <div class="header__controls">
          <div class="date-tabs">
            <button class="date-tab" data-offset="-1">Ontem</button>
            <button class="date-tab active" data-offset="0">Hoje</button>
            <button class="date-tab" data-offset="1">Amanhã</button>
          </div>

          <div class="header__counter" id="request-counter">
            <span>API:</span>
            <span class="header__counter-value">100</span>
            <span>/100</span>
          </div>

          <button id="btn-refresh" title="Atualizar" style="color:var(--text-secondary);font-size:var(--fs-md)">&#8635;</button>
        </div>
      </div>
    </header>

    <!-- Date Display & Filters -->
    <div class="filters">
      <span id="date-display" style="font-weight:600;margin-right:auto;font-size:var(--fs-sm)"></span>

      <select class="filter-select" id="league-filter">
        <option value="">Todas as Ligas</option>
      </select>

      <button class="filter-chip" data-pattern="btts">BTTS</button>
      <button class="filter-chip" data-pattern="over25">O2.5</button>
      <button class="filter-chip" data-pattern="handicap">HC-1</button>
      <button class="filter-chip" data-pattern="firsthalf">V1P</button>
      <button class="filter-chip" data-pattern="homewin">1</button>
      <button class="filter-chip" data-pattern="awaywin">2</button>
    </div>

    <!-- BTTS Scanner Section -->
    <section class="top-picks" id="top-picks-section" style="display:none">
      <div class="top-picks__inner">
        <div class="top-picks__header">
          <div class="top-picks__title">&#9917; BTTS Scanner</div>
          <div class="top-picks__subtitle">Ambas Marcam — análise profunda de 30+ ligas</div>
          <button class="top-picks__analyze-btn" id="btn-analyze">
            Analisar BTTS <span id="analyze-cost"></span>
          </button>
        </div>
        <div class="top-picks__grid" id="top-picks-grid">
          <!-- Top picks cards load here -->
        </div>
        <div class="top-picks__loading" id="top-picks-loading" style="display:none">
          <div class="top-picks__progress">
            <div class="top-picks__progress-bar" id="top-picks-progress-bar"></div>
          </div>
          <span class="top-picks__progress-text" id="top-picks-progress-text">A analisar...</span>
        </div>
      </div>
    </section>

    <!-- Main Layout -->
    <div class="main">
      <div class="main__content" id="fixtures-container">
        <!-- Fixtures load here -->
      </div>

      <!-- Picks Sidebar -->
      <aside class="picks-sidebar" id="picks-sidebar">
        <div class="picks-panel">
          <div class="picks-panel__header">
            <div class="picks-panel__title">
              Picks <span class="picks-panel__count" id="picks-count">0</span>
            </div>
            <button class="picks-panel__clear" id="picks-clear">Limpar</button>
          </div>
          <div id="picks-empty" class="picks-panel__empty">
            Clica nos padrões para adicionar picks
          </div>
          <div class="picks-panel__list" id="picks-list"></div>
        </div>
      </aside>
    </div>

    <!-- Mobile Picks FAB -->
    <button class="picks-fab" id="picks-fab" title="Ver picks">0</button>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>
  </div>

  <!-- Auth Gate -->
  <script src="js/auth.js"></script>

  <!-- Scripts (order matters - only load after auth) -->
  <script src="config.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/cache.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/api.js"></script>
  <script src="js/analysis.js"></script>
  <script src="js/picks.js"></script>
  <script src="js/fixtures.js"></script>
  <script src="js/top-picks.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
